# SonarCloud (SonarQube) analysis for the VibeXP documentation site.
#
# This drives CI-based analysis from .github/workflows/ci.yml. CI analysis and
# SonarCloud "Automatic Analysis" are mutually exclusive, so Automatic Analysis
# must be disabled for the vibexp_docs project (SonarCloud -> Administration ->
# Analysis Method) or scans are rejected.
sonar.organization=vibexp
sonar.projectKey=vibexp_docs

# Analyse application source only; tests live beside sources and drive coverage.
sonar.sources=src

# Vitest v8 coverage report (npm run test:coverage -> coverage/lcov.info). Paths
# in the lcov are repo-relative (src/...) since vitest runs at the repo root.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep build output and test files out of analysis.
sonar.exclusions=dist/**,.astro/**,**/*.test.*,**/*.spec.*
